<div id="chart-investimentos"></div>
<script>
  (function () {
    var labels = {{ dados.labels|safe }};
    var valores = {{ dados.valores|safe }};
    var semDados = labels.length === 0;

    var options = {
      series: semDados ? [1] : valores,
      labels: semDados ? ['Sem dados'] : labels,
      chart: {
        type: 'donut',
        height: 220,
        background: 'transparent',
        animations: { enabled: true, easing: 'easeinout', speed: 600 }
      },
      theme: { mode: 'dark' },
      stroke: { show: false },
      colors: semDados
        ? ['#1e293b']
        : ['#4ADE80', '#60A5FA', '#FBBF24', '#A78BFA', '#FB923C'],
      legend: {
        position: 'bottom',
        labels: { colors: '#94a3b8' },
        markers: { radius: 4 }
      },
      dataLabels: {
        enabled: !semDados,
        formatter: function(val) { return val.toFixed(0) + '%'; },
        style: { colors: ['#0f172a'], fontSize: '11px', fontWeight: 600 },
        dropShadow: { enabled: false }
      },
      plotOptions: {
        pie: {
          donut: {
            size: '65%',
            labels: {
              show: !semDados,
              total: {
                show: true,
                label: 'Total',
                color: '#94a3b8',
                fontSize: '12px',
                fontWeight: 500,
                formatter: function(w) {
                  var total = w.globals.seriesTotals.reduce(function (a, b) { return a + b; }, 0);
                  return semDados ? '—' : total.toFixed(0) + '%';
                }
              }
            }
          }
        }
      },
      tooltip: {
        theme: 'dark',
        y: { formatter: function(v) { return semDados ? '—' : v + '%'; } }
      }
    };

    if (window.chartInvestimentos) { window.chartInvestimentos.destroy(); }
    window.chartInvestimentos = new ApexCharts(document.getElementById('chart-investimentos'), options);
    window.chartInvestimentos.render();
  })();
</script>
