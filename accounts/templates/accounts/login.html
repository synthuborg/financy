<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui; }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen antialiased">
<div class="min-h-screen bg-zinc-950 flex items-center justify-center relative overflow-hidden">
  <!-- Orbs de fundo -->
  <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-violet-600/20 blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-emerald-500/15 blur-3xl pointer-events-none">
  </div>

  <div class="relative w-full max-w-md px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center space-x-2 mb-4">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-emerald-500 flex items-center justify-center">
          <span class="text-white font-bold">F</span>
        </div>
        <span class="text-2xl font-bold text-white">FinTrack</span>
      </div>
      <h1 class="text-xl font-semibold text-white">Bem-vindo de volta</h1>
      <p class="text-zinc-400 text-sm mt-1">Entre na sua conta para continuar</p>
    </div>

    <!-- Formulário -->
    <div class="glass rounded-2xl p-8">
      {% if form.errors %}
      <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-6" role="alert">
        <p class="text-red-400 text-sm">Usuário ou senha inválidos. Tente novamente.</p>
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <!-- Usuário -->
        <div>
          <label for="id_username" class="block text-zinc-300 text-sm font-medium mb-2">Usuário</label>
          <input type="text" name="username" id="id_username" autocomplete="username" required class="w-full bg-zinc-900/50 border border-zinc-700 text-white rounded-xl px-4 py-3 text-sm
                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent
                               placeholder-zinc-500 transition-all" placeholder="Seu nome de usuário">
        </div>

        <!-- Senha -->
        <div>
          <label for="id_password" class="block text-zinc-300 text-sm font-medium mb-2">Senha</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required class="w-full bg-zinc-900/50 border border-zinc-700 text-white rounded-xl px-4 py-3 text-sm
                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent
                               placeholder-zinc-500 transition-all" placeholder="••••••••">
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-r from-violet-600 to-violet-500 hover:from-violet-500 hover:to-violet-400
                               text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-violet-500/20 mt-2">
          Entrar
        </button>
      </form>

      <p class="text-center text-zinc-500 text-sm mt-6">
        Não tem conta?
        <a href="{% url 'accounts:register' %}"
          class="text-violet-400 hover:text-violet-300 font-medium transition-colors">
          Criar conta gratuita
        </a>
      </p>
    </div>

    <!-- Voltar -->
    <div class="text-center mt-6">
      <a href="{% url 'core:landing' %}" class="text-zinc-600 hover:text-zinc-400 text-sm transition-colors">
        ← Voltar ao início
      </a>
    </div>
  </div>
</div>
</body>
</html>
