<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | FinTrack</title>
  <script>
    (function () {
      var storageKey = 'fintrack-theme';
      var root = document.documentElement;

      function prefersDark() {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      function getTheme() {
        try {
          var saved = localStorage.getItem(storageKey);
          if (saved === 'light' || saved === 'dark') {
            return { theme: saved, source: 'saved' };
          }
        } catch (error) {
          // Ignora indisponibilidade de armazenamento.
        }

        return { theme: prefersDark() ? 'dark' : 'light', source: 'system' };
      }

      var resolved = getTheme();
      root.classList.remove('theme-light', 'theme-dark', 'dark');
      root.classList.add('theme-' + resolved.theme);
      if (resolved.theme === 'dark') {
        root.classList.add('dark');
      }
      root.dataset.theme = resolved.theme;
      root.dataset.themeSource = resolved.source;
      root.style.colorScheme = resolved.theme;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui; }

    :root {
      --app-bg: #0a0a0a;
      --surface-0: #18181b;
      --surface-1: #27272a;
      --border-1: #3f3f46;
      --text-1: #ffffff;
      --text-2: #a1a1aa;
      --text-3: #52525b;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    html.theme-light {
      --app-bg: #f4f7fb;
      --surface-0: #ffffff;
      --surface-1: #e2e8f0;
      --border-1: #cbd5e1;
      --text-1: #0f172a;
      --text-2: #334155;
      --text-3: #64748b;
      --glass-bg: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(148, 163, 184, 0.4);
    }

    html.theme-light .bg-zinc-950 { background-color: var(--app-bg) !important; }
    html.theme-light .bg-zinc-900\/50,
    html.theme-light .bg-zinc-900\/60,
    html.theme-light .bg-zinc-800 { background-color: var(--surface-0) !important; }
    html.theme-light .border-zinc-700,
    html.theme-light .border-zinc-800 { border-color: var(--border-1) !important; }
    html.theme-light .text-white,
    html.theme-light .text-zinc-50,
    html.theme-light .text-zinc-300 { color: var(--text-1) !important; }
    html.theme-light .text-zinc-400,
    html.theme-light .text-zinc-500 { color: var(--text-2) !important; }
    html.theme-light .text-zinc-600 { color: var(--text-3) !important; }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen antialiased">
<div class="min-h-screen bg-zinc-950 flex items-center justify-center relative overflow-hidden py-12">
  <button type="button" data-theme-toggle aria-label="Alternar tema" class="absolute top-4 right-4 z-20 px-3 py-2 rounded-lg text-xs font-medium
                 bg-zinc-900/60 border border-zinc-700 text-zinc-300 hover:bg-zinc-800 transition-colors">
    <span data-theme-toggle-icon aria-hidden="true">🌙</span>
    <span data-theme-toggle-label>Escuro</span>
  </button>
  <!-- Orbs de fundo -->
  <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-violet-600/15 blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-emerald-500/10 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center space-x-2 mb-4">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-emerald-500 flex items-center justify-center">
          <span class="text-white font-bold">F</span>
        </div>
        <span class="text-2xl font-bold text-white">FinTrack</span>
      </div>
      <h1 class="text-xl font-semibold text-white">Crie sua conta</h1>
      <p class="text-zinc-400 text-sm mt-1">Gratuito. Sem cartão de crédito.</p>
    </div>

    <!-- Formulário -->
    <div class="glass rounded-2xl p-6">
      <form method="post" class="space-y-4">
        {% csrf_token %}

        {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-zinc-300 text-xs font-medium mb-1.5">
            {{ field.label }}
          </label>
          <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}"
            {% if field.value %}value="{{ field.value }}" {% endif %} class="w-full bg-zinc-900/50 border
                               {% if field.errors %}border-red-500{% else %}border-zinc-700{% endif %}
                               text-white rounded-xl px-3 py-2.5 text-sm
                               focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent
                               placeholder-zinc-500 transition-all" placeholder="{{ field.label }}">
          {% if field.errors %}
          <p class="text-red-400 text-[10px] mt-1" role="alert">{{ field.errors|join:", " }}</p>
          {% endif %}
          {% if field.help_text %}
          <div class="text-zinc-600 text-[10px] leading-tight mt-1 [&_ul]:list-none [&_ul]:p-0 [&_ul]:m-0 [&_li]:mt-0.5">{{ field.help_text|safe }}</div>
          {% endif %}
        </div>
        {% endfor %}

        <button type="submit"
          class="w-full bg-gradient-to-r from-violet-600 to-emerald-500 hover:opacity-90
                               text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg shadow-violet-500/20 mt-2 text-sm">
          Criar conta gratuita
        </button>
      </form>

      <p class="text-center text-zinc-500 text-sm mt-6">
        Já tem conta?
        <a href="{% url 'accounts:login' %}"
          class="text-violet-400 hover:text-violet-300 font-medium transition-colors">
          Entrar
        </a>
      </p>
    </div>

    <!-- Voltar -->
    <div class="text-center mt-6">
      <a href="{% url 'core:landing' %}" class="text-zinc-600 hover:text-zinc-400 text-sm transition-colors">
        ← Voltar ao início
      </a>
    </div>
  </div>
</div>
<script>
  (function () {
    var storageKey = 'fintrack-theme';
    var root = document.documentElement;
    var mediaQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

    function setTheme(theme, source) {
      root.classList.remove('theme-light', 'theme-dark', 'dark');
      root.classList.add('theme-' + theme);
      if (theme === 'dark') {
        root.classList.add('dark');
      }
      root.dataset.theme = theme;
      root.dataset.themeSource = source;
      root.style.colorScheme = theme;
    }

    function updateUI(theme) {
      var isDark = theme === 'dark';
      document.querySelectorAll('[data-theme-toggle-icon]').forEach(function (el) {
        el.textContent = isDark ? '🌙' : '☀️';
      });
      document.querySelectorAll('[data-theme-toggle-label]').forEach(function (el) {
        el.textContent = isDark ? 'Escuro' : 'Claro';
      });
    }

    function toggleTheme() {
      var current = root.dataset.theme === 'light' ? 'light' : 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      setTheme(next, 'saved');
      updateUI(next);
      try {
        localStorage.setItem(storageKey, next);
      } catch (error) {
        // Ignora indisponibilidade de armazenamento.
      }
    }

    document.querySelectorAll('[data-theme-toggle]').forEach(function (button) {
      button.addEventListener('click', toggleTheme);
    });

    if (mediaQuery) {
      mediaQuery.addEventListener('change', function (event) {
        if (root.dataset.themeSource !== 'saved') {
          setTheme(event.matches ? 'dark' : 'light', 'system');
          updateUI(root.dataset.theme);
        }
      });
    }

    updateUI(root.dataset.theme === 'light' ? 'light' : 'dark');
  })();
</script>
</body>
</html>
